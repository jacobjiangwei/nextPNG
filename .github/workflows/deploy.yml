name: Deploy to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - run: npm run build
        working-directory: web

      - name: Copy static assets into standalone
        run: |
          cp -r web/public web/.next/standalone/web/public
          cp -r web/.next/static web/.next/standalone/web/.next/static
          cp web/server.js web/.next/standalone/web/server.js

      - uses: azure/webapps-deploy@v3
        with:
          app-name: newpng
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: web/.next/standalone/web
